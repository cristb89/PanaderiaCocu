<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <meta name="author" content="Cristian Brandan">
    <meta name="description" content="En COCU elaboramos productos de panadería, pastelería y cafetería, con materia prima de primera calidad. Te invitamos a probar nuestras exquisiteces">
    <meta name="keywords" content="pan, tortillas, facturas, tortas, café, leche, dulce, salado">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Panadería Cocu</title>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html"><img src="img/cocu_logo-450.png" alt="Logo panadería cocu" width="100px"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#boton-hamburguesa" aria-controls="boton-hamburguesa" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="boton-hamburguesa">
                    <u class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" href="index.html" aria-current="page">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="pages/historia.html" aria-current="page">Historia</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="pages/productos.html" aria-current="page">Productos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="pages/contacto.html" aria-current="page">Contacto</a>
                        </li>
                    </u>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section id="carrusel-panaderia" class="carousel slide">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carrusel-panaderia" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                <button type="button" data-bs-target="#carrusel-panaderia" data-bs-slide-to="1" aria-label="Slide 2"></button>
                <button type="button" data-bs-target="#carrusel-panaderia" data-bs-slide-to="2" aria-label="Slide 3"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="img/slider_201603_lemonpie.jpg" class="d-block w-100 carrusel-responsive" alt="Foto de porciones de lemon pie">
                </div>
                <div class="carousel-item">
                    <img src="img/slider_201603_painchoco.jpg" class="d-block w-100 carrusel-responsive" alt="Foto de facturas">
                </div>
                <div class="carousel-item">
                    <img src="img/slider_201603_sandwich.jpg" class="d-block w-100 carrusel-responsive" alt="Foto de un sandwich">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carrusel-panaderia" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carrusel-panaderia" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </section>
        <h1>Sobre nosotros</h1>
        <hr>
    </main>
    <footer class="bg-dark text-secondary py-5">
        <section class="container">
            <div class="row text-center">
                <aside class="col-md-4">
                    <img src="img/cocu_logo-450.png" alt="Logo panadería cocu" width="100px">
                </aside>
                <aside class="col-md-4">
                    <h5>Horarios de atención</h5>
                    <ul class="list-unstyled">
                        <li>Lunes a viernes de 07 a 19hs</li>
                        <li>Sabados de 08 a 12 hs</li>
                    </ul>
                </aside>
                <aside class="col-md-4">
                    <h5>Seguinos en nuestras redes</h5>
                    <div>
                        <a class="link-secondary" href="pages/error404.html"><i class="bi bi-facebook fs-4 mx-2"></i></a>
                        <a class="link-secondary" href="pages/error404.html"><i class="bi bi-twitter fs-4 mx-2"></i></a>
                        <a class="link-secondary" href="pages/error404.html"><i class="bi bi-instagram fs-4 mx-2"></i></a>
                        <a class="link-secondary" href="pages/error404.html"><i class="bi bi-whatsapp fs-4 mx-2"></i></a>
                    </div>
                </aside>
            </div>
        </section>
    </footer>
    <script src="js/bootstrap.min.js"></script>
